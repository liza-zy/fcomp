services:
  db:
    image: postgres:16
    container_name: fcomp_db
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcomp -d fcomp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

    volumes:
      - ./data_lake:/app/data_lake
    expose:
      - "8000"

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
      interval: 10s
      timeout: 5s
      retries: 5
    

  bot:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    command: ["python", "src/bot/main.py"]
    depends_on:
      - api
      - db
    restart: unless-stopped
    volumes:
      - ./data_lake:/app/data_lake


  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    working_dir: /app/apps/web
    command: npm run dev -- -H 0.0.0.0 -p 3000
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "https://fcomp.duckdns.org/api"
    expose:
      - "3000"
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
