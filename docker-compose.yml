services:
  db:
    image: postgres:16
    container_name: fcomp_db
    env_file: ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcomp -d fcomp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    

  bot:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    command: ["python", "src/bot/main.py"]
    depends_on:
      - api
      - db
    restart: unless-stopped

volumes:
  postgres_data:
