services:
  db:
    image: postgres:16
    container_name: fcomp_db
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    

  bot:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./.env
    environment:
      PYTHONPATH: /app
    command: ["python", "src/bot/main.py"]
    depends_on:
      - api
      - db
    restart: unless-stopped

volumes:
  postgres_data: